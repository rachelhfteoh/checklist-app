<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Checklist — Soft Aurora Preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --font: 'Plus Jakarta Sans', sans-serif;
      --text: #1a1a2e;
      --text-soft: #5a5a7a;
      --text-muted: #9898b8;
      --white: #ffffff;
      --card-shadow: 0 2px 20px rgba(120, 80, 200, 0.08);
      --border: rgba(180, 160, 220, 0.25);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
    }

    /* ── Aurora mesh background ── */
    body {
      background: #c8baf0;
      position: relative;
    }

    .aurora-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }

    /* Individual blobs */
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.75;
    }

    .blob-1 {
      width: 420px; height: 420px;
      background: #c084fc;
      top: -80px; left: -100px;
      animation: drift1 12s ease-in-out infinite alternate;
    }

    .blob-2 {
      width: 380px; height: 380px;
      background: #67e8f9;
      top: 40px; right: -80px;
      animation: drift2 14s ease-in-out infinite alternate;
    }

    .blob-3 {
      width: 350px; height: 350px;
      background: #f9a8d4;
      bottom: 100px; left: -60px;
      animation: drift3 11s ease-in-out infinite alternate;
    }

    .blob-4 {
      width: 300px; height: 300px;
      background: #a5f3fc;
      bottom: -60px; right: -40px;
      animation: drift1 13s ease-in-out infinite alternate-reverse;
    }

    .blob-5 {
      width: 260px; height: 260px;
      background: #d8b4fe;
      top: 45%; left: 30%;
      animation: drift2 10s ease-in-out infinite alternate;
    }

    @keyframes drift1 {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(30px, 20px) scale(1.05); }
    }
    @keyframes drift2 {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(-25px, 30px) scale(0.97); }
    }
    @keyframes drift3 {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(20px, -25px) scale(1.04); }
    }

    #app {
      position: relative;
      z-index: 1;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      max-width: 480px;
      margin: 0 auto;
    }

    /* ── Views ── */
    .view {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    .header {
      padding: 52px 20px 16px;
      flex-shrink: 0;
    }

    .header-title {
      font-size: 30px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.5px;
    }

    .header-subtitle {
      font-size: 14px;
      color: var(--text-soft);
      font-weight: 500;
      margin-top: 3px;
    }

    /* ── Content ── */
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 8px 20px 120px;
      -webkit-overflow-scrolling: touch;
    }

    /* ── List cards ── */
    .list-card {
      background: rgba(255, 255, 255, 0.72);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: var(--card-shadow);
      padding: 18px 18px 14px;
      margin-bottom: 12px;
      cursor: pointer;
      opacity: 0;
      animation: riseUp 0.4s ease forwards;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .list-card:active {
      transform: scale(0.983);
      box-shadow: 0 1px 8px rgba(120,80,200,0.06);
    }

    .list-card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .list-card-name {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      flex: 1;
    }

    .list-card-count {
      font-size: 12px;
      font-weight: 600;
      color: #7c3aed;
      background: rgba(167, 139, 250, 0.18);
      border-radius: 20px;
      padding: 3px 10px;
      margin-left: 10px;
      flex-shrink: 0;
    }

    .progress-text {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 500;
      margin-bottom: 7px;
    }

    .progress-text.complete {
      color: #059669;
      font-weight: 600;
    }

    .progress-bar-track {
      height: 5px;
      background: rgba(180, 160, 220, 0.2);
      border-radius: 5px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      border-radius: 5px;
      background: linear-gradient(90deg, #6d28d9, #d946ef);
    }

    /* ── Detail header ── */
    .detail-header-top {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }

    .back-btn {
      display: flex;
      align-items: center;
      gap: 4px;
      background: rgba(255,255,255,0.72);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: var(--card-shadow);
      padding: 8px 14px 8px 10px;
      cursor: pointer;
      font-family: var(--font);
      font-size: 14px;
      font-weight: 600;
      color: #7c3aed;
      flex-shrink: 0;
    }

    .detail-list-name {
      font-size: 22px;
      font-weight: 800;
      color: var(--text);
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .icon-btn {
      width: 38px;
      height: 38px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.72);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: var(--card-shadow);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-soft);
      flex-shrink: 0;
    }

    /* ── Progress summary ── */
    .detail-progress-summary {
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(255,255,255,0.72);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: var(--card-shadow);
      padding: 11px 14px;
    }

    .detail-progress-nums {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-soft);
      white-space: nowrap;
    }

    .detail-progress-nums .done-count {
      color: #7c3aed;
      font-weight: 800;
    }

    .detail-progress-bar-track {
      flex: 1;
      height: 6px;
      background: rgba(180,160,220,0.2);
      border-radius: 6px;
      overflow: hidden;
    }

    .detail-progress-bar-fill {
      height: 100%;
      border-radius: 6px;
      background: linear-gradient(90deg, #6d28d9, #d946ef);
    }

    .reset-btn {
      font-size: 12px;
      font-weight: 700;
      color: #7c3aed;
      background: rgba(167,139,250,0.15);
      border: 1px solid rgba(167,139,250,0.3);
      border-radius: 10px;
      padding: 6px 12px;
      cursor: pointer;
      font-family: var(--font);
      white-space: nowrap;
    }

    /* ── Checklist items ── */
    .checklist-item {
      background: rgba(255,255,255,0.72);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: var(--card-shadow);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      overflow: hidden;
      opacity: 0;
      animation: riseUp 0.35s ease forwards;
    }

    .checklist-item.is-checked { opacity: 0.55; }

    .item-main {
      display: flex;
      align-items: center;
      padding: 14px 12px 14px 16px;
      flex: 1;
      gap: 12px;
      cursor: pointer;
    }

    .item-checkbox {
      width: 24px;
      height: 24px;
      border-radius: 8px;
      border: 1.5px solid rgba(167,139,250,0.5);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.6);
    }

    .checklist-item.is-checked .item-checkbox {
      background: linear-gradient(135deg, #6d28d9, #d946ef);
      border-color: transparent;
    }

    .item-checkbox svg { opacity: 0; }
    .checklist-item.is-checked .item-checkbox svg { opacity: 1; }

    .item-text {
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
      flex: 1;
      word-break: break-word;
      line-height: 1.4;
    }

    .checklist-item.is-checked .item-text {
      text-decoration: line-through;
      color: var(--text-muted);
    }

    .item-delete {
      width: 40px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      padding: 0 12px 0 4px;
    }

    .items-section-header {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      padding: 12px 4px 8px;
    }

    /* ── FAB ── */
    .fab {
      position: fixed;
      bottom: calc(28px + var(--safe-bottom));
      right: 24px;
      width: 58px;
      height: 58px;
      border-radius: 18px;
      background: linear-gradient(135deg, #6d28d9 0%, #d946ef 100%);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 6px 24px rgba(91, 33, 182, 0.45);
      z-index: 100;
      transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .fab:active { transform: scale(0.91); }

    /* ── Preview label ── */
    .preview-label {
      position: fixed;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-soft);
      z-index: 999;
      white-space: nowrap;
    }

    /* ── Tabs ── */
    .preview-tabs {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      z-index: 999;
    }

    .tab-btn {
      padding: 8px 16px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      font-family: var(--font);
      font-size: 13px;
      font-weight: 600;
      color: var(--text-soft);
      cursor: pointer;
      transition: all 0.15s;
    }

    .tab-btn.active {
      background: linear-gradient(135deg, #6d28d9, #d946ef);
      color: white;
      border-color: transparent;
      box-shadow: 0 4px 14px rgba(91,33,182,0.4);
    }

    /* ── Animations ── */
    @keyframes riseUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (min-width: 600px) {
      .fab { right: calc(50% - 240px + 24px); }
    }
  </style>
</head>
<body>

  <!-- Aurora background blobs -->
  <div class="aurora-bg">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="blob blob-4"></div>
    <div class="blob blob-5"></div>
  </div>

  <div class="preview-label">✦ Soft Aurora Preview</div>

  <div id="app">

    <!-- HOME VIEW -->
    <div class="view" id="home-view">
      <div class="header">
        <div class="header-title">My Lists</div>
        <div class="header-subtitle">3 lists</div>
      </div>
      <div class="content">

        <div class="list-card" style="animation-delay:0s">
          <div class="list-card-header">
            <div class="list-card-name">🛒 Grocery</div>
            <div class="list-card-count">2/5</div>
          </div>
          <div class="progress-text">40% complete</div>
          <div class="progress-bar-track">
            <div class="progress-bar-fill" style="width:40%"></div>
          </div>
        </div>

        <div class="list-card" style="animation-delay:0.07s">
          <div class="list-card-header">
            <div class="list-card-name">✈️ Europe Trip</div>
            <div class="list-card-count">0/12</div>
          </div>
          <div class="progress-text">Not started</div>
          <div class="progress-bar-track">
            <div class="progress-bar-fill" style="width:0%"></div>
          </div>
        </div>

        <div class="list-card" style="animation-delay:0.14s">
          <div class="list-card-header">
            <div class="list-card-name">🏥 Pharmacy</div>
            <div class="list-card-count">3/3</div>
          </div>
          <div class="progress-text complete">✓ All done!</div>
          <div class="progress-bar-track">
            <div class="progress-bar-fill" style="width:100%"></div>
          </div>
        </div>

      </div>
    </div>

    <!-- DETAIL VIEW -->
    <div class="view" id="detail-view" style="display:none">
      <div class="header">
        <div class="detail-header-top">
          <button class="back-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
            Lists
          </button>
          <div class="detail-list-name">🛒 Grocery</div>
          <button class="icon-btn">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="3 6 5 6 21 6"/>
              <path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/>
              <path d="M10 11v6M14 11v6"/>
              <path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/>
            </svg>
          </button>
        </div>
        <div class="detail-progress-summary">
          <div class="detail-progress-nums"><span class="done-count">2</span> / 5 done</div>
          <div class="detail-progress-bar-track">
            <div class="detail-progress-bar-fill" style="width:40%"></div>
          </div>
          <button class="reset-btn">Reset</button>
        </div>
      </div>
      <div class="content">

        <div class="checklist-item" style="animation-delay:0s">
          <div class="item-main">
            <div class="item-checkbox"></div>
            <div class="item-text">Eggs</div>
          </div>
          <button class="item-delete">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>

        <div class="checklist-item" style="animation-delay:0.05s">
          <div class="item-main">
            <div class="item-checkbox"></div>
            <div class="item-text">Butter</div>
          </div>
          <button class="item-delete">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>

        <div class="checklist-item" style="animation-delay:0.1s">
          <div class="item-main">
            <div class="item-checkbox"></div>
            <div class="item-text">Orange juice</div>
          </div>
          <button class="item-delete">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>

        <div class="items-section-header">Completed (2)</div>

        <div class="checklist-item is-checked" style="animation-delay:0.15s">
          <div class="item-main">
            <div class="item-checkbox">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            </div>
            <div class="item-text">Milk</div>
          </div>
          <button class="item-delete">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>

        <div class="checklist-item is-checked" style="animation-delay:0.2s">
          <div class="item-main">
            <div class="item-checkbox">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            </div>
            <div class="item-text">Bread</div>
          </div>
          <button class="item-delete">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>

      </div>
    </div>

  </div>

  <!-- FAB -->
  <button class="fab">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <line x1="12" y1="5" x2="12" y2="19"/>
      <line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
  </button>

  <!-- Preview tabs -->
  <div class="preview-tabs">
    <button class="tab-btn active" onclick="showView('home')">Home</button>
    <button class="tab-btn" onclick="showView('detail')">List Detail</button>
  </div>

  <script>
    function showView(v) {
      document.getElementById('home-view').style.display = v === 'home' ? 'flex' : 'none';
      document.getElementById('detail-view').style.display = v === 'detail' ? 'flex' : 'none';
      document.querySelectorAll('.tab-btn').forEach((b, i) => {
        b.classList.toggle('active', (i === 0 && v === 'home') || (i === 1 && v === 'detail'));
      });
    }
  </script>
</body>
</html>
