<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Checklist — Glassmorphism Preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --font: 'Plus Jakarta Sans', sans-serif;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
    }

    /* ── Vivid gradient background ── */
    body {
      background: #4a1a9e;
      position: relative;
    }

    /* Coloured blobs that make glass effect pop */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 60% at 15% 10%, #9d6fe8 0%, transparent 65%),
        radial-gradient(ellipse 55% 50% at 85% 5%,  #f472b6 0%, transparent 60%),
        radial-gradient(ellipse 60% 55% at 50% 90%, #818cf8 0%, transparent 65%),
        radial-gradient(ellipse 40% 40% at 80% 60%, #c084fc 0%, transparent 55%),
        radial-gradient(ellipse 50% 40% at 10% 75%, #60a5fa 0%, transparent 55%);
      z-index: 0;
      pointer-events: none;
    }

    #app {
      position: relative;
      z-index: 1;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      max-width: 480px;
      margin: 0 auto;
    }

    /* ── Glass mixin (reused via class) ── */
    .glass {
      background: rgba(255, 255, 255, 0.10);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.22);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25), inset 0 1px 0 rgba(255,255,255,0.2);
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.10);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.18);
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.2), inset 0 1px 0 rgba(255,255,255,0.15);
      border-radius: 20px;
    }

    /* ── Layout ── */
    .view {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .header {
      padding: 52px 20px 16px;
      flex-shrink: 0;
    }

    .header-title {
      font-size: 30px;
      font-weight: 800;
      color: #ffffff;
      letter-spacing: -0.5px;
    }

    .header-subtitle {
      font-size: 14px;
      color: rgba(255,255,255,0.55);
      font-weight: 500;
      margin-top: 3px;
    }

    .content {
      flex: 1;
      overflow-y: auto;
      padding: 8px 20px 120px;
      -webkit-overflow-scrolling: touch;
    }

    /* ── List cards ── */
    .list-card {
      border-radius: 20px;
      padding: 18px 18px 14px;
      margin-bottom: 12px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      animation: slideUp 0.4s ease forwards;
      opacity: 0;
    }

    .list-card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .list-card-name {
      font-size: 16px;
      font-weight: 700;
      color: #ffffff;
    }

    .list-card-count {
      font-size: 12px;
      font-weight: 600;
      color: rgba(255,255,255,0.9);
      background: rgba(255,255,255,0.18);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 20px;
      padding: 3px 10px;
      margin-left: 10px;
      flex-shrink: 0;
    }

    .progress-text {
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      font-weight: 500;
      margin-bottom: 7px;
    }

    .progress-text.complete {
      color: #a3e635;
      font-weight: 600;
    }

    .progress-bar-track {
      height: 4px;
      background: rgba(255,255,255,0.15);
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, rgba(255,255,255,0.9), rgba(255,255,255,0.6));
      border-radius: 4px;
    }

    /* ── Detail view ── */
    .detail-header-top {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }

    .back-btn {
      display: flex;
      align-items: center;
      gap: 4px;
      border: none;
      border-radius: 12px;
      padding: 8px 14px 8px 10px;
      cursor: pointer;
      font-family: var(--font);
      font-size: 14px;
      font-weight: 600;
      color: rgba(255,255,255,0.9);
      transition: opacity 0.15s;
      flex-shrink: 0;
    }

    .detail-list-name {
      font-size: 22px;
      font-weight: 800;
      color: #ffffff;
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .icon-btn {
      width: 38px;
      height: 38px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,0.7);
      flex-shrink: 0;
    }

    .detail-progress-summary {
      display: flex;
      align-items: center;
      gap: 12px;
      border-radius: 14px;
      padding: 11px 14px;
    }

    .detail-progress-nums {
      font-size: 13px;
      font-weight: 600;
      color: rgba(255,255,255,0.6);
      white-space: nowrap;
    }

    .detail-progress-nums .done-count {
      color: #ffffff;
      font-weight: 800;
    }

    .detail-progress-bar-track {
      flex: 1;
      height: 6px;
      background: rgba(255,255,255,0.15);
      border-radius: 6px;
      overflow: hidden;
    }

    .detail-progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, rgba(255,255,255,0.9), rgba(255,255,255,0.55));
      border-radius: 6px;
    }

    .reset-btn {
      font-size: 12px;
      font-weight: 700;
      color: rgba(255,255,255,0.9);
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 10px;
      padding: 6px 12px;
      cursor: pointer;
      font-family: var(--font);
      white-space: nowrap;
    }

    /* ── Checklist items ── */
    .checklist-item {
      border-radius: 16px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      overflow: hidden;
      opacity: 0;
      animation: slideUp 0.3s ease forwards;
    }

    .checklist-item.is-checked {
      opacity: 0.5;
    }

    .item-main {
      display: flex;
      align-items: center;
      padding: 14px 12px 14px 16px;
      flex: 1;
      gap: 12px;
      cursor: pointer;
    }

    .item-checkbox {
      width: 24px;
      height: 24px;
      border-radius: 8px;
      border: 1.5px solid rgba(255,255,255,0.35);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.08);
    }

    .checklist-item.is-checked .item-checkbox {
      background: rgba(255,255,255,0.9);
      border-color: transparent;
    }

    .item-checkbox svg { opacity: 0; }
    .checklist-item.is-checked .item-checkbox svg { opacity: 1; }

    .item-text {
      font-size: 15px;
      font-weight: 500;
      color: rgba(255,255,255,0.92);
      flex: 1;
      word-break: break-word;
      line-height: 1.4;
    }

    .checklist-item.is-checked .item-text {
      text-decoration: line-through;
      color: rgba(255,255,255,0.35);
    }

    .item-delete {
      width: 40px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      cursor: pointer;
      color: rgba(255,255,255,0.3);
      padding: 0 12px 0 4px;
    }

    .items-section-header {
      font-size: 11px;
      font-weight: 700;
      color: rgba(255,255,255,0.35);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      padding: 12px 4px 8px;
    }

    /* ── FAB ── */
    .fab {
      position: fixed;
      bottom: calc(28px + var(--safe-bottom));
      right: 24px;
      width: 58px;
      height: 58px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.3);
      background: rgba(255,255,255,0.22);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.3);
      z-index: 100;
    }

    /* ── Label ── */
    .preview-label {
      position: fixed;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 12px;
      font-weight: 600;
      color: rgba(255,255,255,0.8);
      z-index: 999;
      white-space: nowrap;
    }

    /* ── Tabs ── */
    .preview-tabs {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      z-index: 999;
    }

    .tab-btn {
      padding: 8px 16px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.25);
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      font-family: var(--font);
      font-size: 13px;
      font-weight: 600;
      color: rgba(255,255,255,0.7);
      cursor: pointer;
      transition: all 0.15s;
    }

    .tab-btn.active {
      background: rgba(255,255,255,0.25);
      color: white;
      border-color: rgba(255,255,255,0.4);
    }

    /* ── Animations ── */
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (min-width: 600px) {
      .fab { right: calc(50% - 240px + 24px); }
    }
  </style>
</head>
<body>
  <div class="preview-label">✦ Glassmorphism Preview</div>

  <div id="app">
    <!-- HOME VIEW -->
    <div class="view" id="home-view">
      <div class="header">
        <div class="header-title">My Lists</div>
        <div class="header-subtitle">3 lists</div>
      </div>
      <div class="content">

        <div class="list-card glass-card" style="animation-delay:0s">
          <div class="list-card-header">
            <div class="list-card-name">🛒 Grocery</div>
            <div class="list-card-count">2/5</div>
          </div>
          <div class="progress-text">40% complete</div>
          <div class="progress-bar-track">
            <div class="progress-bar-fill" style="width:40%"></div>
          </div>
        </div>

        <div class="list-card glass-card" style="animation-delay:0.06s">
          <div class="list-card-header">
            <div class="list-card-name">✈️ Europe Trip</div>
            <div class="list-card-count">0/12</div>
          </div>
          <div class="progress-text">Not started</div>
          <div class="progress-bar-track">
            <div class="progress-bar-fill" style="width:0%"></div>
          </div>
        </div>

        <div class="list-card glass-card" style="animation-delay:0.12s">
          <div class="list-card-header">
            <div class="list-card-name">🏥 Pharmacy</div>
            <div class="list-card-count">3/3</div>
          </div>
          <div class="progress-text complete">✓ All done!</div>
          <div class="progress-bar-track">
            <div class="progress-bar-fill" style="width:100%"></div>
          </div>
        </div>

      </div>
    </div>

    <!-- DETAIL VIEW (hidden by default, shown via tab) -->
    <div class="view" id="detail-view" style="display:none">
      <div class="header">
        <div class="detail-header-top">
          <button class="back-btn glass">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
            Lists
          </button>
          <div class="detail-list-name">🛒 Grocery</div>
          <button class="icon-btn glass">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="3 6 5 6 21 6"/>
              <path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/>
              <path d="M10 11v6M14 11v6"/>
              <path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/>
            </svg>
          </button>
        </div>
        <div class="detail-progress-summary glass-card">
          <div class="detail-progress-nums"><span class="done-count">2</span> / 5 done</div>
          <div class="detail-progress-bar-track">
            <div class="detail-progress-bar-fill" style="width:40%"></div>
          </div>
          <button class="reset-btn">Reset</button>
        </div>
      </div>
      <div class="content">
        <div class="checklist-item glass-card" style="animation-delay:0s">
          <div class="item-main">
            <div class="item-checkbox">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#7c3aed" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            </div>
            <div class="item-text">Eggs</div>
          </div>
          <button class="item-delete">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>

        <div class="checklist-item glass-card" style="animation-delay:0.04s">
          <div class="item-main">
            <div class="item-checkbox"></div>
            <div class="item-text">Butter</div>
          </div>
          <button class="item-delete">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>

        <div class="checklist-item glass-card" style="animation-delay:0.08s">
          <div class="item-main">
            <div class="item-checkbox"></div>
            <div class="item-text">Orange juice</div>
          </div>
          <button class="item-delete">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>

        <div class="items-section-header">Completed (2)</div>

        <div class="checklist-item glass-card is-checked" style="animation-delay:0.12s">
          <div class="item-main">
            <div class="item-checkbox">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#7c3aed" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            </div>
            <div class="item-text">Milk</div>
          </div>
          <button class="item-delete">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>

        <div class="checklist-item glass-card is-checked" style="animation-delay:0.16s">
          <div class="item-main">
            <div class="item-checkbox">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#7c3aed" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            </div>
            <div class="item-text">Bread</div>
          </div>
          <button class="item-delete">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- FAB -->
  <button class="fab">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <line x1="12" y1="5" x2="12" y2="19"/>
      <line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
  </button>

  <!-- Preview tabs -->
  <div class="preview-tabs">
    <button class="tab-btn active" onclick="showView('home')">Home</button>
    <button class="tab-btn" onclick="showView('detail')">List Detail</button>
  </div>

  <script>
    function showView(v) {
      document.getElementById('home-view').style.display = v === 'home' ? 'flex' : 'none';
      document.getElementById('detail-view').style.display = v === 'detail' ? 'flex' : 'none';
      document.querySelectorAll('.tab-btn').forEach((b, i) => {
        b.classList.toggle('active', (i === 0 && v === 'home') || (i === 1 && v === 'detail'));
      });
    }
  </script>
</body>
</html>
