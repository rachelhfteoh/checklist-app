<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Checklist — Dark Neon Preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --font: 'Plus Jakarta Sans', sans-serif;
      --bg: #0b0b12;
      --surface: #13131f;
      --surface-2: #1a1a2e;
      --neon: #a259ff;
      --neon-teal: #00e5cc;
      --neon-pink: #ff4ecd;
      --text: #f0eeff;
      --text-soft: #8888aa;
      --text-muted: #55556a;
      --border: rgba(162, 89, 255, 0.18);
      --border-teal: rgba(0, 229, 204, 0.18);
      --glow: 0 0 20px rgba(162, 89, 255, 0.25);
      --glow-teal: 0 0 20px rgba(0, 229, 204, 0.2);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
      background: var(--bg);
    }

    /* subtle grid texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(162,89,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(162,89,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* ambient glow blobs */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 50% 40% at 20% 20%, rgba(162,89,255,0.12) 0%, transparent 65%),
        radial-gradient(ellipse 45% 35% at 80% 75%, rgba(0,229,204,0.1) 0%, transparent 60%),
        radial-gradient(ellipse 35% 30% at 75% 15%, rgba(255,78,205,0.07) 0%, transparent 55%);
      pointer-events: none;
      z-index: 0;
    }

    #app {
      position: relative;
      z-index: 1;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      max-width: 480px;
      margin: 0 auto;
    }

    .view {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    .header {
      padding: 52px 20px 16px;
      flex-shrink: 0;
    }

    .header-title {
      font-size: 30px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.5px;
    }

    .header-subtitle {
      font-size: 14px;
      color: var(--text-soft);
      font-weight: 500;
      margin-top: 3px;
    }

    /* ── Content ── */
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 8px 20px 120px;
      -webkit-overflow-scrolling: touch;
    }

    /* ── List cards ── */
    .list-card {
      background: var(--surface);
      border-radius: 18px;
      border: 1px solid var(--border);
      padding: 18px 18px 14px;
      margin-bottom: 12px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      opacity: 0;
      animation: riseUp 0.4s ease forwards;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .list-card:hover {
      border-color: rgba(162,89,255,0.4);
      box-shadow: var(--glow);
    }

    /* neon top-edge glow line */
    .list-card::before {
      content: '';
      position: absolute;
      top: 0; left: 16px; right: 16px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(162,89,255,0.6), transparent);
    }

    .list-card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .list-card-name {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      flex: 1;
    }

    .list-card-count {
      font-size: 12px;
      font-weight: 600;
      color: var(--neon);
      background: rgba(162,89,255,0.12);
      border: 1px solid rgba(162,89,255,0.25);
      border-radius: 20px;
      padding: 3px 10px;
      margin-left: 10px;
      flex-shrink: 0;
    }

    .progress-text {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 500;
      margin-bottom: 7px;
    }

    .progress-text.complete {
      color: var(--neon-teal);
      font-weight: 600;
    }

    .progress-bar-track {
      height: 4px;
      background: rgba(255,255,255,0.05);
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      border-radius: 4px;
      background: linear-gradient(90deg, var(--neon), var(--neon-teal));
      box-shadow: 0 0 8px rgba(162,89,255,0.6);
    }

    /* ── Detail header ── */
    .detail-header-top {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }

    .back-btn {
      display: flex;
      align-items: center;
      gap: 4px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 8px 14px 8px 10px;
      cursor: pointer;
      font-family: var(--font);
      font-size: 14px;
      font-weight: 600;
      color: var(--neon);
      flex-shrink: 0;
      transition: box-shadow 0.2s;
    }

    .back-btn:hover { box-shadow: var(--glow); }

    .detail-list-name {
      font-size: 22px;
      font-weight: 800;
      color: var(--text);
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .icon-btn {
      width: 38px;
      height: 38px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--surface);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-soft);
      flex-shrink: 0;
      transition: color 0.15s, border-color 0.15s;
    }

    .icon-btn:hover {
      color: #ff4e4e;
      border-color: rgba(255,78,78,0.3);
    }

    /* ── Progress summary ── */
    .detail-progress-summary {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 11px 14px;
      box-shadow: var(--glow);
    }

    .detail-progress-nums {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-soft);
      white-space: nowrap;
    }

    .detail-progress-nums .done-count {
      color: var(--neon);
      font-weight: 800;
    }

    .detail-progress-bar-track {
      flex: 1;
      height: 6px;
      background: rgba(255,255,255,0.05);
      border-radius: 6px;
      overflow: hidden;
    }

    .detail-progress-bar-fill {
      height: 100%;
      border-radius: 6px;
      background: linear-gradient(90deg, var(--neon), var(--neon-teal));
      box-shadow: 0 0 8px rgba(162,89,255,0.5);
    }

    .reset-btn {
      font-size: 12px;
      font-weight: 700;
      color: var(--neon);
      background: rgba(162,89,255,0.1);
      border: 1px solid rgba(162,89,255,0.3);
      border-radius: 10px;
      padding: 6px 12px;
      cursor: pointer;
      font-family: var(--font);
      white-space: nowrap;
      transition: box-shadow 0.15s;
    }

    .reset-btn:hover { box-shadow: var(--glow); }

    /* ── Checklist items ── */
    .checklist-item {
      background: var(--surface);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 14px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      overflow: hidden;
      opacity: 0;
      animation: riseUp 0.35s ease forwards;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .checklist-item:hover {
      border-color: var(--border);
    }

    .checklist-item.is-checked {
      opacity: 0.45;
      background: rgba(19,19,31,0.6);
    }

    .item-main {
      display: flex;
      align-items: center;
      padding: 14px 12px 14px 16px;
      flex: 1;
      gap: 12px;
      cursor: pointer;
    }

    .item-checkbox {
      width: 24px;
      height: 24px;
      border-radius: 8px;
      border: 1.5px solid rgba(162,89,255,0.35);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      transition: all 0.2s ease;
    }

    .checklist-item.is-checked .item-checkbox {
      background: linear-gradient(135deg, var(--neon), var(--neon-teal));
      border-color: transparent;
      box-shadow: 0 0 12px rgba(162,89,255,0.5);
    }

    .item-checkbox svg { opacity: 0; }
    .checklist-item.is-checked .item-checkbox svg { opacity: 1; }

    .item-text {
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
      flex: 1;
      word-break: break-word;
      line-height: 1.4;
    }

    .checklist-item.is-checked .item-text {
      text-decoration: line-through;
      color: var(--text-muted);
    }

    .item-delete {
      width: 40px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      padding: 0 12px 0 4px;
      transition: color 0.15s;
    }

    .item-delete:hover { color: var(--neon-pink); }

    .items-section-header {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      padding: 12px 4px 8px;
    }

    /* ── FAB ── */
    .fab {
      position: fixed;
      bottom: calc(28px + var(--safe-bottom));
      right: 24px;
      width: 58px;
      height: 58px;
      border-radius: 18px;
      background: linear-gradient(135deg, var(--neon) 0%, var(--neon-teal) 100%);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 32px rgba(162,89,255,0.6), 0 4px 20px rgba(0,0,0,0.4);
      z-index: 100;
      transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.2s;
    }

    .fab:active {
      transform: scale(0.91);
      box-shadow: 0 0 16px rgba(162,89,255,0.4);
    }

    /* ── Preview label ── */
    .preview-label {
      position: fixed;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--surface);
      border: 1px solid rgba(162,89,255,0.3);
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 12px;
      font-weight: 600;
      color: var(--neon);
      z-index: 999;
      white-space: nowrap;
      box-shadow: var(--glow);
    }

    /* ── Tabs ── */
    .preview-tabs {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      z-index: 999;
    }

    .tab-btn {
      padding: 8px 16px;
      border-radius: 20px;
      border: 1px solid rgba(162,89,255,0.2);
      background: var(--surface);
      font-family: var(--font);
      font-size: 13px;
      font-weight: 600;
      color: var(--text-soft);
      cursor: pointer;
      transition: all 0.15s;
    }

    .tab-btn.active {
      background: linear-gradient(135deg, var(--neon), var(--neon-teal));
      color: white;
      border-color: transparent;
      box-shadow: 0 0 18px rgba(162,89,255,0.5);
    }

    /* ── Animations ── */
    @keyframes riseUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (min-width: 600px) {
      .fab { right: calc(50% - 240px + 24px); }
    }
  </style>
</head>
<body>

  <div class="preview-label">⚡ Dark Neon Preview</div>

  <div id="app">

    <!-- HOME VIEW -->
    <div class="view" id="home-view">
      <div class="header">
        <div class="header-title">My Lists</div>
        <div class="header-subtitle">3 lists</div>
      </div>
      <div class="content">

        <div class="list-card" style="animation-delay:0s">
          <div class="list-card-header">
            <div class="list-card-name">🛒 Grocery</div>
            <div class="list-card-count">2/5</div>
          </div>
          <div class="progress-text">40% complete</div>
          <div class="progress-bar-track">
            <div class="progress-bar-fill" style="width:40%"></div>
          </div>
        </div>

        <div class="list-card" style="animation-delay:0.07s">
          <div class="list-card-header">
            <div class="list-card-name">✈️ Europe Trip</div>
            <div class="list-card-count">0/12</div>
          </div>
          <div class="progress-text">Not started</div>
          <div class="progress-bar-track">
            <div class="progress-bar-fill" style="width:0%"></div>
          </div>
        </div>

        <div class="list-card" style="animation-delay:0.14s">
          <div class="list-card-header">
            <div class="list-card-name">🏥 Pharmacy</div>
            <div class="list-card-count">3/3</div>
          </div>
          <div class="progress-text complete">✓ All done!</div>
          <div class="progress-bar-track">
            <div class="progress-bar-fill" style="width:100%"></div>
          </div>
        </div>

      </div>
    </div>

    <!-- DETAIL VIEW -->
    <div class="view" id="detail-view" style="display:none">
      <div class="header">
        <div class="detail-header-top">
          <button class="back-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
            Lists
          </button>
          <div class="detail-list-name">🛒 Grocery</div>
          <button class="icon-btn">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="3 6 5 6 21 6"/>
              <path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/>
              <path d="M10 11v6M14 11v6"/>
              <path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/>
            </svg>
          </button>
        </div>
        <div class="detail-progress-summary">
          <div class="detail-progress-nums"><span class="done-count">2</span> / 5 done</div>
          <div class="detail-progress-bar-track">
            <div class="detail-progress-bar-fill" style="width:40%"></div>
          </div>
          <button class="reset-btn">Reset</button>
        </div>
      </div>
      <div class="content">

        <div class="checklist-item" style="animation-delay:0s">
          <div class="item-main">
            <div class="item-checkbox"></div>
            <div class="item-text">Eggs</div>
          </div>
          <button class="item-delete">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>

        <div class="checklist-item" style="animation-delay:0.05s">
          <div class="item-main">
            <div class="item-checkbox"></div>
            <div class="item-text">Butter</div>
          </div>
          <button class="item-delete">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>

        <div class="checklist-item" style="animation-delay:0.1s">
          <div class="item-main">
            <div class="item-checkbox"></div>
            <div class="item-text">Orange juice</div>
          </div>
          <button class="item-delete">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>

        <div class="items-section-header">Completed (2)</div>

        <div class="checklist-item is-checked" style="animation-delay:0.15s">
          <div class="item-main">
            <div class="item-checkbox">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            </div>
            <div class="item-text">Milk</div>
          </div>
          <button class="item-delete">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>

        <div class="checklist-item is-checked" style="animation-delay:0.2s">
          <div class="item-main">
            <div class="item-checkbox">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            </div>
            <div class="item-text">Bread</div>
          </div>
          <button class="item-delete">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>

      </div>
    </div>

  </div>

  <!-- FAB -->
  <button class="fab">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <line x1="12" y1="5" x2="12" y2="19"/>
      <line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
  </button>

  <!-- Preview tabs -->
  <div class="preview-tabs">
    <button class="tab-btn active" onclick="showView('home')">Home</button>
    <button class="tab-btn" onclick="showView('detail')">List Detail</button>
  </div>

  <script>
    function showView(v) {
      document.getElementById('home-view').style.display = v === 'home' ? 'flex' : 'none';
      document.getElementById('detail-view').style.display = v === 'detail' ? 'flex' : 'none';
      document.querySelectorAll('.tab-btn').forEach((b, i) => {
        b.classList.toggle('active', (i === 0 && v === 'home') || (i === 1 && v === 'detail'));
      });
    }
  </script>
</body>
</html>
